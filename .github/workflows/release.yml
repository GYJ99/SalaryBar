name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DMG
        run: |
          chmod +x scripts/package_release.sh
          RUN_TESTS=1 ./scripts/package_release.sh

      - name: Generate SHA256
        run: |
          shasum -a 256 dist/*.dmg > dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
