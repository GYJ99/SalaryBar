name: Release DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "${version}" ]]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

      - name: Select Xcode
        run: |
          xcodebuild -version
          swift --version

      - name: Build DMG
        run: |
          chmod +x scripts/package_release.sh
          RUN_TESTS=1 VERSION="${{ steps.version.outputs.version }}" ./scripts/package_release.sh

      - name: Resolve release assets
        id: assets
        run: |
          version="${{ steps.version.outputs.version }}"
          dmg_path="dist/SalaryBar-${version}.dmg"
          if [[ ! -f "${dmg_path}" ]]; then
            echo "Expected DMG not found: ${dmg_path}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "dmg_path=${dmg_path}" >> "${GITHUB_OUTPUT}"

      - name: Generate SHA256
        run: |
          shasum -a 256 "${{ steps.assets.outputs.dmg_path }}" > dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" >/dev/null 2>&1; then
            gh release upload "$tag" "${{ steps.assets.outputs.dmg_path }}" dist/SHA256SUMS.txt --clobber
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="${tag}" \
              -f target_commitish="${GITHUB_SHA}" \
              -f name="${tag}" \
              -F generate_release_notes=true \
              -F draft=false \
              -F prerelease=false >/dev/null
            gh release upload "$tag" "${{ steps.assets.outputs.dmg_path }}" dist/SHA256SUMS.txt
          fi
